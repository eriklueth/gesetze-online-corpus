name: debug-connectivity

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: curl default
        run: curl -v --max-time 20 https://www.gesetze-im-internet.de/gii-toc.xml -o /tmp/a.xml || echo "FAILED default"
      - name: curl with browser UA
        run: curl -v --max-time 20 -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" https://www.gesetze-im-internet.de/gii-toc.xml -o /tmp/b.xml || echo "FAILED UA"
      - name: curl IPv4 only
        run: curl -v -4 --max-time 20 https://www.gesetze-im-internet.de/gii-toc.xml -o /tmp/c.xml || echo "FAILED 4"
      - name: nslookup
        run: nslookup www.gesetze-im-internet.de || true
      - name: trace
        run: curl -v --max-time 10 --connect-timeout 10 https://www.gesetze-im-internet.de/ 2>&1 | head -40 || true
