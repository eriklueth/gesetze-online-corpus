name: update-corpus

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Check RSS feed
        run: python3 scripts/fetch/rss_updates.py > /tmp/rss_changes.json
      - name: Fetch TOC
        run: python3 scripts/fetch/fetch_toc.py
      - name: Fetch law assets
        run: python3 scripts/fetch/fetch_law_assets.py --limit 25
      - name: Run pipeline
        run: ./scripts/run_pipeline.sh
      - name: Commit changes if needed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "chore: update legal corpus"
          git push
